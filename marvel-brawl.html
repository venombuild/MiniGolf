<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marvel Brawl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8192C;
  --red-dark: #a5111e;
  --gold: #F5A623;
  --dark: #0a0a0a;
  --mid: #161616;
  --card-bg: #1c1c1c;
  --card-border: #2e2e2e;
  --text: #F5F0E8;
  --sub: #7a7a7a;
  --p1: #E8192C;
  --p2: #1e6fd4;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none; z-index: 0;
}

.screen {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 16px 28px;
}
.screen.hidden { display: none; }

.back-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 3px;
  background: transparent; border: none;
  color: var(--sub); cursor: pointer;
  padding: 8px 0; margin-bottom: 10px;
}

.title-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 14vw, 72px);
  letter-spacing: 3px; line-height: 0.9;
  text-align: center;
  text-shadow: 3px 3px 0 var(--red-dark);
}
.title-sub {
  text-align: center; color: var(--sub);
  font-size: 14px; letter-spacing: 1px;
  margin: 10px 0 28px; max-width: 300px; line-height: 1.5;
}

.btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 3px;
  padding: 14px 28px; border: none; cursor: pointer;
  transition: transform 0.1s;
  width: 100%; max-width: 300px;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--red); color: white; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
.btn-ghost { background: transparent; color: var(--sub); border: 1px solid #333; margin-top: 10px; }

.player-tag {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 5px;
  padding: 4px 14px; color: white; margin-bottom: 12px;
}
.player-tag.p1 { background: var(--p1); }
.player-tag.p2 { background: var(--p2); }

.setup-wrap { width: 100%; max-width: 360px; }
.setup-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 4px; color: var(--gold);
  margin-bottom: 10px;
}

.hero-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.hero-card {
  background: var(--card-bg);
  border: 2px solid var(--card-border);
  border-top: 3px solid var(--hero-color, var(--red));
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
}
.hero-card.selected { border-color: var(--gold); background: #1a1508; }
.hero-card.taken { opacity: 0.35; pointer-events: none; }
.hero-icon { font-size: 30px; display: block; margin-bottom: 4px; }
.hero-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; }
.hero-power { font-size: 10px; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

.handoff-inner { text-align: center; max-width: 300px; }
.handoff-icon { font-size: 48px; margin-bottom: 12px; }
.handoff-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 9vw, 48px); letter-spacing: 2px; margin-bottom: 8px; }
.handoff-sub { color: var(--sub); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
.handoff-sub strong { color: var(--gold); }

.battle-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }

.hud-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.fighter-hud {
  background: var(--mid);
  border: 1px solid var(--card-border);
  border-top: 3px solid var(--fighter-color, var(--red));
  padding: 10px 12px;
}
.fighter-hud-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
.fighter-hud-player { font-size: 10px; color: var(--sub); letter-spacing: 2px; text-transform: uppercase; }
.hp-bar { height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin: 8px 0 4px; }
.hp-fill { height: 100%; background: var(--fighter-color, var(--red)); transition: width 0.2s; }
.hp-text { font-size: 11px; color: var(--sub); }
.power-meter { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; margin-top: 6px; }
.power-fill { height: 100%; background: var(--gold); transition: width 0.05s linear; }

.arena-wrap { width: 100%; max-width: 340px; margin: 0 auto; }

#arena-canvas {
  display: block;
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: #111;
  border: 2px solid #333;
}

.status-banner {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--gold);
}

.battle-log {
  background: #111;
  border: 1px solid #222;
  padding: 10px 12px;
  min-height: 56px;
  max-height: 72px;
  overflow-y: auto;
  font-size: 13px;
  color: var(--sub);
  line-height: 1.45;
}
.battle-log strong { color: var(--text); }

.win-wrap { text-align: center; max-width: 320px; }
.win-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(56px, 16vw, 80px);
  color: var(--gold);
  letter-spacing: 4px;
  line-height: 0.9;
  margin-bottom: 8px;
}
.win-sub { color: var(--sub); margin-bottom: 28px; line-height: 1.6; }
.win-sub strong { color: var(--text); }
</style>
</head>
<body>

<div class="screen" id="screen-title">
  <div style="text-align:center;max-width:320px;">
    <button type="button" class="back-btn" id="btn-hub">&larr; Hub</button>
    <div class="title-logo">MARVEL<br>BRAWL</div>
    <p class="title-sub">Pick your hero and watch the fight. Balls bounce, powers fire on their own — last hero standing wins.</p>
    <button type="button" class="btn btn-primary" id="btn-fight">Enter Arena</button>
  </div>
</div>

<div class="screen hidden" id="screen-pick">
  <div class="setup-wrap">
    <button type="button" class="back-btn" id="btn-back-title">&larr; Back</button>
    <div class="player-tag p1" id="pick-player-tag">Player 1</div>
    <p class="setup-label">Choose Your Hero</p>
    <div class="hero-grid" id="hero-grid"></div>
    <button type="button" class="btn btn-primary" id="btn-confirm-pick" disabled>Lock In</button>
  </div>
</div>

<div class="screen hidden" id="screen-handoff">
  <div class="handoff-inner">
    <div class="handoff-icon">📲</div>
    <div class="handoff-title" id="handoff-title">Pass the Phone</div>
    <p class="handoff-sub" id="handoff-sub"></p>
    <button type="button" class="btn btn-primary" id="btn-handoff">Ready</button>
  </div>
</div>

<div class="screen hidden" id="screen-battle" style="justify-content:flex-start;padding-top:14px;">
  <div class="battle-wrap">
    <div class="hud-row" id="hud-row"></div>
    <div class="arena-wrap">
      <canvas id="arena-canvas" width="340" height="340"></canvas>
    </div>
    <div class="status-banner" id="status-banner">FIGHT!</div>
    <div class="battle-log" id="battle-log"></div>
  </div>
</div>

<div class="screen hidden" id="screen-win">
  <div class="win-wrap">
    <div class="win-title">KO!</div>
    <div class="title-logo" id="win-hero" style="font-size:48px;margin-bottom:8px;">HULK</div>
    <p class="win-sub"><strong id="win-player"></strong> wins!</p>
    <button type="button" class="btn btn-primary" id="btn-rematch">Rematch</button>
    <button type="button" class="btn btn-ghost" id="btn-win-hub">Back to Hub</button>
  </div>
</div>

<script>
const BALL_R = 18;
const ARENA_R = 150;
const CENTER = 170;
const BALL_SPEED = 165;

const HEROES = {
  ironman: {
    id: "ironman", name: "Iron Man", icon: "🤖", color: "#c41e2a", hp: 100,
    power: { type: "beam", name: "Unibeam", damage: 12, range: 140, interval: 3.2, windup: 0.5, beam: true }
  },
  cap: {
    id: "cap", name: "Captain America", icon: "🛡️", color: "#1e4a8c", hp: 115,
    power: { type: "beam", name: "Shield Throw", damage: 10, range: 95, interval: 2.4, windup: 0.4, shield: 8 }
  },
  thor: {
    id: "thor", name: "Thor", icon: "⚡", color: "#6b4ce6", hp: 105,
    power: { type: "beam", name: "Lightning", damage: 9, range: 9999, interval: 2.8, windup: 0.45, global: true, lightning: true }
  },
  hulk: {
    id: "hulk", name: "Hulk", icon: "💪", color: "#3d8b37", hp: 135,
    power: { type: "touch", name: "Smash", damage: 18, interval: 3.8 }
  }
};

const state = {
  p1Hero: null,
  p2Hero: null,
  fighters: [],
  handoffNext: null,
  pickStep: 1,
  selectedHero: null,
  log: [],
  effects: [],
  running: false,
  animId: null,
  elapsed: 0
};

const canvas = document.getElementById("arena-canvas");
const ctx = canvas.getContext("2d");

function show(id) {
  document.querySelectorAll(".screen").forEach((s) => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function getFighter(p) { return state.fighters.find((f) => f.player === p); }
function getHeroDef(id) { return HEROES[id]; }

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function ballsTouching(a, b) {
  return dist(a, b) <= BALL_R * 2 + 1;
}

function isFrozen(fighter) {
  return fighter.windup || fighter.recover > 0;
}

function addLog(msg) {
  state.log.unshift(msg);
  if (state.log.length > 3) state.log.pop();
  document.getElementById("battle-log").innerHTML = state.log.map((l) => "<div>" + l + "</div>").join("");
}

function randomVelocity() {
  const angle = Math.random() * Math.PI * 2;
  return { vx: Math.cos(angle) * BALL_SPEED, vy: Math.sin(angle) * BALL_SPEED };
}

function resolveCircleWall(ball) {
  const dx = ball.x - CENTER;
  const dy = ball.y - CENTER;
  const d = Math.sqrt(dx * dx + dy * dy);
  const maxD = ARENA_R - BALL_R;

  if (d > maxD && d > 0) {
    const nx = dx / d;
    const ny = dy / d;
    ball.x = CENTER + nx * maxD;
    ball.y = CENTER + ny * maxD;
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy) || 1;
    ball.vx = (ball.vx / speed) * BALL_SPEED;
    ball.vy = (ball.vy / speed) * BALL_SPEED;
  }
}

function resolveBallCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  const minD = BALL_R * 2;
  let touched = false;

  if (d < minD && d > 0) {
    touched = true;
    const nx = dx / d;
    const ny = dy / d;
    const overlap = minD - d;
    a.x -= nx * overlap * 0.5;
    a.y -= ny * overlap * 0.5;
    b.x += nx * overlap * 0.5;
    b.y += ny * overlap * 0.5;

    if (!isFrozen(a) && !isFrozen(b)) {
      const dvn = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
      if (dvn > 0) {
        a.vx -= dvn * nx;
        a.vy -= dvn * ny;
        b.vx += dvn * nx;
        b.vy += dvn * ny;
      }

      const sa = Math.sqrt(a.vx * a.vx + a.vy * a.vy) || 1;
      const sb = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 1;
      a.vx = (a.vx / sa) * BALL_SPEED;
      a.vy = (a.vy / sa) * BALL_SPEED;
      b.vx = (b.vx / sb) * BALL_SPEED;
      b.vy = (b.vy / sb) * BALL_SPEED;
    }
  }

  if (touched) tryTouchPowers(a, b);
}

function tryTouchPowers(a, b) {
  [[a, b], [b, a]].forEach(([attacker, defender]) => {
    const power = getHeroDef(attacker.heroId).power;
    if (power.type !== "touch") return;
    if (isFrozen(attacker)) return;
    if (attacker.powerTimer < power.interval) return;
    firePower(attacker, defender);
  });
}

function canStartBeam(attacker, defender) {
  const p = getHeroDef(attacker.heroId).power;
  if (p.type !== "beam") return false;
  if (p.global) return true;
  return dist(attacker, defender) <= p.range;
}

function startWindup(attacker, defender) {
  const power = getHeroDef(attacker.heroId).power;
  attacker.savedVx = attacker.vx;
  attacker.savedVy = attacker.vy;
  attacker.vx = 0;
  attacker.vy = 0;
  attacker.windup = { defender, timeLeft: power.windup };
}

function firePower(attacker, defender) {
  const hero = getHeroDef(attacker.heroId);
  const power = hero.power;

  let damage = power.damage;

  if (power.beam) {
    state.effects.push({ type: "beam", until: state.elapsed + 0.35, x1: attacker.x, y1: attacker.y, x2: defender.x, y2: defender.y });
  } else if (power.lightning) {
    state.effects.push({ type: "lightning", until: state.elapsed + 0.35, x1: attacker.x, y1: attacker.y, x2: defender.x, y2: defender.y });
  } else if (power.type === "touch") {
    state.effects.push({ type: "smash", until: state.elapsed + 0.3, x: defender.x, y: defender.y, r: 38 });
  } else {
    state.effects.push({ type: "beam", until: state.elapsed + 0.3, x1: attacker.x, y1: attacker.y, x2: defender.x, y2: defender.y });
  }

  if (defender.shield > 0) {
    const blocked = Math.min(defender.shield, damage);
    damage -= blocked;
    defender.shield -= blocked;
  }

  defender.hp = Math.max(0, defender.hp - damage);
  attacker.powerTimer = 0;
  if (power.shield) attacker.shield = power.shield;

  addLog(hero.icon + " <strong>" + power.name + "</strong> → " + damage + " dmg");

  if (defender.hp <= 0) {
    endBattle(attacker);
    return true;
  }
  return true;
}

function endBattle(winner) {
  state.running = false;
  if (state.animId) cancelAnimationFrame(state.animId);
  const hero = getHeroDef(winner.heroId);
  document.getElementById("win-hero").textContent = hero.name.toUpperCase();
  document.getElementById("win-player").textContent = winner.name;
  show("screen-win");
}

function updateHud() {
  const hud = document.getElementById("hud-row");
  hud.innerHTML = "";

  state.fighters.forEach((f) => {
    const h = getHeroDef(f.heroId);
    const pct = Math.max(0, (f.hp / f.maxHp) * 100);
    const charge = Math.min(100, (f.powerTimer / h.power.interval) * 100);

    const div = document.createElement("div");
    div.className = "fighter-hud";
    div.style.setProperty("--fighter-color", h.color);
    div.innerHTML =
      '<div class="fighter-hud-player">Player ' + f.player + "</div>" +
      '<div class="fighter-hud-name">' + h.icon + " " + h.name + "</div>" +
      '<div class="hp-bar"><div class="hp-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="hp-text">' + Math.ceil(f.hp) + " HP</div>" +
      '<div class="power-meter"><div class="power-fill" style="width:' + charge + '%"></div></div>';
    hud.appendChild(div);
  });
}

function drawArena() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(CENTER, CENTER, ARENA_R, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(CENTER, CENTER, 20, CENTER, CENTER, ARENA_R);
  grad.addColorStop(0, "#1e1e1e");
  grad.addColorStop(1, "#0d0d0d");
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 3;
  ctx.stroke();

  state.effects = state.effects.filter((fx) => fx.until > state.elapsed);
  state.effects.forEach((fx) => {
    if (fx.type === "beam") {
      ctx.strokeStyle = "rgba(232,25,44,0.9)";
      ctx.lineWidth = 5;
      ctx.shadowColor = "#E8192C";
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(fx.x1, fx.y1);
      ctx.lineTo(fx.x2, fx.y2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    if (fx.type === "lightning") {
      ctx.strokeStyle = "rgba(140,120,255,0.95)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(fx.x1, fx.y1);
      const midX = (fx.x1 + fx.x2) / 2 + (Math.random() - 0.5) * 20;
      const midY = (fx.y1 + fx.y2) / 2 + (Math.random() - 0.5) * 20;
      ctx.lineTo(midX, midY);
      ctx.lineTo(fx.x2, fx.y2);
      ctx.stroke();
    }
    if (fx.type === "smash") {
      ctx.strokeStyle = "rgba(61,139,55,0.85)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  state.fighters.forEach((f) => {
    const hero = getHeroDef(f.heroId);

    if (f.windup) {
      const pulse = 1 + Math.sin(state.elapsed * 14) * 0.08;
      ctx.beginPath();
      ctx.arc(f.x, f.y, BALL_R + 10 * pulse, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(245,166,35,0.7)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(f.x, f.y, BALL_R + 3, 0, Math.PI * 2);
    ctx.strokeStyle = f.player === 1 ? "#E8192C" : "#1e6fd4";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(f.x, f.y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = hero.color;
    ctx.fill();

    const speed = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
    if (speed > 5) {
      const nx = f.vx / speed;
      const ny = f.vy / speed;
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(f.x - nx * 20, f.y - ny * 20);
      ctx.lineTo(f.x, f.y);
      ctx.stroke();
    }

    ctx.font = "20px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(hero.icon, f.x, f.y + 1);
  });
}

function updateFighterAction(fighter, dt) {
  if (fighter.windup) {
    fighter.windup.timeLeft -= dt;
    if (fighter.windup.timeLeft <= 0) {
      const target = fighter.windup.defender;
      fighter.windup = null;
      if (state.running && target.hp > 0) {
        firePower(fighter, target);
        if (!state.running) return;
      }
      fighter.recover = 0.25;
    }
    return;
  }

  if (fighter.recover > 0) {
    fighter.recover -= dt;
    if (fighter.recover <= 0) {
      const sx = fighter.savedVx || 0;
      const sy = fighter.savedVy || 0;
      const speed = Math.sqrt(sx * sx + sy * sy);
      if (speed < 10) {
        const v = randomVelocity();
        fighter.vx = v.vx;
        fighter.vy = v.vy;
      } else {
        fighter.vx = (sx / speed) * BALL_SPEED;
        fighter.vy = (sy / speed) * BALL_SPEED;
      }
    }
  }
}

function battleStep(dt) {
  if (!state.running) return;

  state.elapsed += dt;
  const f1 = state.fighters[0];
  const f2 = state.fighters[1];

  [f1, f2].forEach((fighter) => updateFighterAction(fighter, dt));
  if (!state.running) return;

  [f1, f2].forEach((ball) => {
    if (isFrozen(ball)) return;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    resolveCircleWall(ball);
  });
  resolveBallCollision(f1, f2);
  if (!state.running) return;

  [f1, f2].forEach((fighter) => {
    if (isFrozen(fighter)) return;
    const opponent = fighter === f1 ? f2 : f1;
    const power = getHeroDef(fighter.heroId).power;
    fighter.powerTimer += dt;

    if (power.type === "beam" && fighter.powerTimer >= power.interval && canStartBeam(fighter, opponent)) {
      startWindup(fighter, opponent);
    }
  });

  updateHud();
  drawArena();
}

function startBattleLoop() {
  state.running = true;
  state.elapsed = 0;
  state.effects = [];
  let last = performance.now();

  if (state.animId) cancelAnimationFrame(state.animId);

  function tick(now) {
    if (!state.running) return;
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    battleStep(dt);
    state.animId = requestAnimationFrame(tick);
  }

  state.animId = requestAnimationFrame(tick);
}

function initBattle() {
  const h1 = getHeroDef(state.p1Hero);
  const h2 = getHeroDef(state.p2Hero);
  const v1 = randomVelocity();
  const v2 = randomVelocity();

  state.fighters = [
    {
      player: 1, name: "Player 1", heroId: state.p1Hero,
      hp: h1.hp, maxHp: h1.hp,
      x: CENTER - 65, y: CENTER - 40,
      vx: v1.vx, vy: v1.vy,
      powerTimer: h1.power.interval * 0.5,
      shield: 0, windup: null, recover: 0, savedVx: 0, savedVy: 0
    },
    {
      player: 2, name: "Player 2", heroId: state.p2Hero,
      hp: h2.hp, maxHp: h2.hp,
      x: CENTER + 65, y: CENTER + 40,
      vx: v2.vx, vy: v2.vy,
      powerTimer: h2.power.interval * 0.5,
      shield: 0, windup: null, recover: 0, savedVx: 0, savedVy: 0
    }
  ];

  state.log = [];
  addLog("<strong>FIGHT!</strong> " + h1.name + " vs " + h2.name);
  document.getElementById("status-banner").textContent = "WATCH THE BRAWL";
  updateHud();
  drawArena();
  show("screen-battle");
  startBattleLoop();
}

function renderHeroGrid() {
  const grid = document.getElementById("hero-grid");
  const taken = state.pickStep === 2 ? state.p1Hero : null;
  grid.innerHTML = "";
  Object.values(HEROES).forEach((hero) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "hero-card";
    card.style.setProperty("--hero-color", hero.color);
    if (hero.id === taken) card.classList.add("taken");
    if (state.selectedHero === hero.id) card.classList.add("selected");
    card.innerHTML =
      '<span class="hero-icon">' + hero.icon + "</span>" +
      '<span class="hero-name">' + hero.name + "</span>" +
      '<span class="hero-power">' + hero.power.name + "</span>";
    card.addEventListener("click", () => {
      if (hero.id === taken) return;
      state.selectedHero = hero.id;
      document.getElementById("btn-confirm-pick").disabled = false;
      renderHeroGrid();
    });
    grid.appendChild(card);
  });
}

function showPickScreen(step) {
  state.pickStep = step;
  state.selectedHero = null;
  document.getElementById("btn-confirm-pick").disabled = true;
  const tag = document.getElementById("pick-player-tag");
  tag.textContent = "Player " + step;
  tag.className = "player-tag " + (step === 1 ? "p1" : "p2");
  renderHeroGrid();
  show("screen-pick");
}

function showHandoff(title, subHtml, next) {
  document.getElementById("handoff-title").textContent = title;
  document.getElementById("handoff-sub").innerHTML = subHtml;
  state.handoffNext = next;
  show("screen-handoff");
}

function confirmPick() {
  if (!state.selectedHero) return;
  if (state.pickStep === 1) {
    state.p1Hero = state.selectedHero;
    showHandoff("Pass to Player 2", "Pick a hero — don't peek!", "pick2");
  } else {
    state.p2Hero = state.selectedHero;
    showHandoff("Ready to Watch?", "Both heroes locked in.<br>Tap <strong>Start Fight</strong> and enjoy the show!", "battle");
  }
}

document.getElementById("btn-hub").addEventListener("click", () => { window.location.href = "index.html"; });
document.getElementById("btn-win-hub").addEventListener("click", () => { window.location.href = "index.html"; });
document.getElementById("btn-fight").addEventListener("click", () => showPickScreen(1));
document.getElementById("btn-back-title").addEventListener("click", () => show("screen-title"));
document.getElementById("btn-confirm-pick").addEventListener("click", confirmPick);
document.getElementById("btn-handoff").addEventListener("click", () => {
  if (state.handoffNext === "pick2") showPickScreen(2);
  else if (state.handoffNext === "battle") initBattle();
});
document.getElementById("btn-rematch").addEventListener("click", () => {
  state.running = false;
  if (state.animId) cancelAnimationFrame(state.animId);
  showPickScreen(1);
});
</script>
</body>
</html>
