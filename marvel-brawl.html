<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marvel Brawl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8192C;
  --red-dark: #a5111e;
  --gold: #F5A623;
  --dark: #0a0a0a;
  --mid: #161616;
  --card-bg: #1c1c1c;
  --card-border: #2e2e2e;
  --text: #F5F0E8;
  --sub: #7a7a7a;
  --p1: #E8192C;
  --p2: #1e6fd4;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none; z-index: 0;
}

.screen {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 16px 28px;
}
.screen.hidden { display: none; }

.back-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 3px;
  background: transparent; border: none;
  color: var(--sub); cursor: pointer;
  padding: 8px 0; margin-bottom: 10px;
}

.title-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 14vw, 72px);
  letter-spacing: 3px; line-height: 0.9;
  text-align: center;
  text-shadow: 3px 3px 0 var(--red-dark);
}
.title-sub {
  text-align: center; color: var(--sub);
  font-size: 14px; letter-spacing: 1px;
  margin: 10px 0 28px; max-width: 300px; line-height: 1.5;
}

.btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 3px;
  padding: 14px 28px; border: none; cursor: pointer;
  transition: transform 0.1s;
  width: 100%; max-width: 300px;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--red); color: white; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
.btn-ghost { background: transparent; color: var(--sub); border: 1px solid #333; margin-top: 10px; }
.btn-sm { font-size: 15px; padding: 10px 14px; letter-spacing: 2px; max-width: none; }

.player-tag {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 5px;
  padding: 4px 14px; color: white; margin-bottom: 12px;
}
.player-tag.p1 { background: var(--p1); }
.player-tag.p2 { background: var(--p2); }

.setup-wrap { width: 100%; max-width: 360px; }
.setup-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 4px; color: var(--gold);
  margin-bottom: 10px;
}

.hero-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.hero-card {
  background: var(--card-bg);
  border: 2px solid var(--card-border);
  border-top: 3px solid var(--hero-color, var(--red));
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
}
.hero-card.selected { border-color: var(--gold); background: #1a1508; }
.hero-card.taken { opacity: 0.35; pointer-events: none; }
.hero-icon { font-size: 30px; display: block; margin-bottom: 4px; }
.hero-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; }
.hero-power { font-size: 10px; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

.handoff-inner { text-align: center; max-width: 300px; }
.handoff-icon { font-size: 48px; margin-bottom: 12px; }
.handoff-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 9vw, 48px); letter-spacing: 2px; margin-bottom: 8px; }
.handoff-sub { color: var(--sub); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
.handoff-sub strong { color: var(--gold); }

.battle-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }

.hud-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.fighter-hud {
  background: var(--mid);
  border: 1px solid var(--card-border);
  border-top: 3px solid var(--fighter-color, var(--red));
  padding: 10px 12px;
}
.fighter-hud.active { box-shadow: 0 0 0 1px var(--gold); }
.fighter-hud-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
.fighter-hud-player { font-size: 10px; color: var(--sub); letter-spacing: 2px; text-transform: uppercase; }
.hp-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 8px 0 4px; }
.hp-fill { height: 100%; background: var(--fighter-color, var(--red)); transition: width 0.3s; }
.hp-text { font-size: 11px; color: var(--sub); }
.cooldown-text { font-size: 10px; color: var(--gold); letter-spacing: 1px; margin-top: 2px; }
.shield-text { font-size: 10px; color: #5cf0ff; letter-spacing: 1px; }

.arena-wrap {
  width: 100%;
  max-width: 340px;
  margin: 0 auto;
  position: relative;
}

#arena-canvas {
  display: block;
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: #111;
  border: 2px solid #333;
  touch-action: none;
}

.phase-banner {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--gold);
  min-height: 20px;
}

.action-panel {
  background: var(--mid);
  border: 1px solid var(--card-border);
  padding: 12px;
}
.action-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 3px;
  color: var(--gold); margin-bottom: 8px;
}
.action-row { display: flex; gap: 8px; }
.action-row .btn { flex: 1; }

.battle-log {
  background: #111;
  border: 1px solid #222;
  padding: 10px 12px;
  min-height: 64px;
  max-height: 80px;
  overflow-y: auto;
  font-size: 13px;
  color: var(--sub);
  line-height: 1.45;
}
.battle-log strong { color: var(--text); }

.win-wrap { text-align: center; max-width: 320px; }
.win-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(56px, 16vw, 80px);
  color: var(--gold);
  letter-spacing: 4px;
  line-height: 0.9;
  margin-bottom: 8px;
}
.win-sub { color: var(--sub); margin-bottom: 28px; line-height: 1.6; }
.win-sub strong { color: var(--text); }
</style>
</head>
<body>

<div class="screen" id="screen-title">
  <div style="text-align:center;max-width:320px;">
    <button type="button" class="back-btn" id="btn-hub">&larr; Hub</button>
    <div class="title-logo">MARVEL<br>BRAWL</div>
    <p class="title-sub">Heroes bounce around the arena each turn — then unleash their power. Last one standing wins.</p>
    <button type="button" class="btn btn-primary" id="btn-fight">Enter Arena</button>
  </div>
</div>

<div class="screen hidden" id="screen-pick">
  <div class="setup-wrap">
    <button type="button" class="back-btn" id="btn-back-title">&larr; Back</button>
    <div class="player-tag p1" id="pick-player-tag">Player 1</div>
    <p class="setup-label">Choose Your Hero</p>
    <div class="hero-grid" id="hero-grid"></div>
    <button type="button" class="btn btn-primary" id="btn-confirm-pick" disabled>Lock In</button>
  </div>
</div>

<div class="screen hidden" id="screen-handoff">
  <div class="handoff-inner">
    <div class="handoff-icon">📲</div>
    <div class="handoff-title" id="handoff-title">Pass the Phone</div>
    <p class="handoff-sub" id="handoff-sub"></p>
    <button type="button" class="btn btn-primary" id="btn-handoff">Ready</button>
  </div>
</div>

<div class="screen hidden" id="screen-battle" style="justify-content:flex-start;padding-top:14px;">
  <div class="battle-wrap">
    <button type="button" class="back-btn" id="btn-quit">&larr; Quit</button>
    <div class="hud-row" id="hud-row"></div>

    <div class="arena-wrap">
      <canvas id="arena-canvas" width="340" height="340"></canvas>
    </div>

    <div class="phase-banner" id="phase-banner">DRIFTING...</div>

    <div class="action-panel">
      <div class="action-title" id="action-title">Player 1's Turn</div>
      <div class="action-row">
        <button type="button" class="btn btn-sm btn-primary" id="btn-power" disabled>Power</button>
        <button type="button" class="btn btn-sm btn-ghost" id="btn-end-turn" disabled>End Turn</button>
      </div>
      <p style="font-size:11px;color:var(--sub);margin-top:8px;letter-spacing:1px;" id="action-hint">Balls are bouncing...</p>
    </div>

    <div class="battle-log" id="battle-log"></div>
  </div>
</div>

<div class="screen hidden" id="screen-win">
  <div class="win-wrap">
    <div class="win-title">KO!</div>
    <div class="title-logo" id="win-hero" style="font-size:48px;margin-bottom:8px;">HULK</div>
    <p class="win-sub"><strong id="win-player"></strong> wins the brawl!</p>
    <button type="button" class="btn btn-primary" id="btn-rematch">Rematch</button>
    <button type="button" class="btn btn-ghost" id="btn-win-hub">Back to Hub</button>
  </div>
</div>

<script>
const BALL_R = 18;
const ARENA_R = 150;
const CENTER = 170;
const DRIFT_SPEED = 200;
const DRIFT_TIME = 2.4;
const DRIFT_FRICTION = 0.9992;

const HEROES = {
  ironman: {
    id: "ironman", name: "Iron Man", icon: "🤖", color: "#c41e2a", hp: 100,
    power: { name: "Unibeam", damage: 30, range: 130, cooldown: 3, beam: true }
  },
  cap: {
    id: "cap", name: "Captain America", icon: "🛡️", color: "#1e4a8c", hp: 115,
    power: { name: "Shield Throw", damage: 25, range: 90, cooldown: 2, shield: 15 }
  },
  thor: {
    id: "thor", name: "Thor", icon: "⚡", color: "#6b4ce6", hp: 105,
    power: { name: "Lightning", damage: 22, range: 9999, cooldown: 3, global: true }
  },
  hulk: {
    id: "hulk", name: "Hulk", icon: "💪", color: "#3d8b37", hp: 135,
    power: { name: "Smash", damage: 45, range: 50, cooldown: 4 }
  }
};

const state = {
  p1Hero: null, p2Hero: null,
  fighters: [],
  currentPlayer: 1,
  turn: 1,
  phase: "drift",
  handoffNext: null,
  pickStep: 1,
  selectedHero: null,
  log: [],
  driftTimer: 0,
  animId: null,
  effects: []
};

const canvas = document.getElementById("arena-canvas");
const ctx = canvas.getContext("2d");

function show(id) {
  document.querySelectorAll(".screen").forEach((s) => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function getFighter(p) { return state.fighters.find((f) => f.player === p); }
function getOpponent(p) { return getFighter(p === 1 ? 2 : 1); }
function getHeroDef(id) { return HEROES[id]; }

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function addLog(msg) {
  state.log.unshift(msg);
  if (state.log.length > 4) state.log.pop();
  document.getElementById("battle-log").innerHTML = state.log.map((l) => "<div>" + l + "</div>").join("");
}

function randomDriftVelocity() {
  const angle = Math.random() * Math.PI * 2;
  return { vx: Math.cos(angle) * DRIFT_SPEED, vy: Math.sin(angle) * DRIFT_SPEED };
}

function resolveCircleWall(ball) {
  const dx = ball.x - CENTER;
  const dy = ball.y - CENTER;
  const d = Math.sqrt(dx * dx + dy * dy);
  const maxD = ARENA_R - BALL_R;

  if (d > maxD && d > 0) {
    const nx = dx / d;
    const ny = dy / d;
    ball.x = CENTER + nx * maxD;
    ball.y = CENTER + ny * maxD;
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
    ball.bounces += 1;
  }
}

function resolveBallCollision(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  const minD = BALL_R * 2;

  if (d < minD && d > 0) {
    const nx = dx / d;
    const ny = dy / d;
    const overlap = minD - d;
    a.x -= nx * overlap * 0.5;
    a.y -= ny * overlap * 0.5;
    b.x += nx * overlap * 0.5;
    b.y += ny * overlap * 0.5;

    const dvn = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
    if (dvn > 0) {
      a.vx -= dvn * nx;
      a.vy -= dvn * ny;
      b.vx += dvn * nx;
      b.vy += dvn * ny;
    }
  }
}

function drawArena() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(CENTER, CENTER, ARENA_R, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(CENTER, CENTER, 20, CENTER, CENTER, ARENA_R);
  grad.addColorStop(0, "#1e1e1e");
  grad.addColorStop(1, "#0d0d0d");
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;
  for (let i = 1; i <= 3; i += 1) {
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, ARENA_R * (i / 4), 0, Math.PI * 2);
    ctx.stroke();
  }

  state.effects.forEach((fx) => {
    if (fx.type === "beam") {
      ctx.strokeStyle = "rgba(232,25,44,0.85)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(fx.x1, fx.y1);
      ctx.lineTo(fx.x2, fx.y2);
      ctx.stroke();
    }
    if (fx.type === "lightning") {
      ctx.strokeStyle = "rgba(107,76,230,0.9)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(fx.x1, fx.y1);
      ctx.lineTo(fx.x2, fx.y2);
      ctx.stroke();
    }
    if (fx.type === "smash") {
      ctx.strokeStyle = "rgba(61,139,55,0.8)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  state.fighters.forEach((f) => {
    const hero = getHeroDef(f.heroId);
    const isActive = f.player === state.currentPlayer;

    ctx.beginPath();
    ctx.arc(f.x, f.y, BALL_R + 3, 0, Math.PI * 2);
    ctx.strokeStyle = f.player === 1 ? "#E8192C" : "#1e6fd4";
    ctx.lineWidth = isActive ? 4 : 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(f.x, f.y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = hero.color;
    ctx.fill();

    ctx.font = "20px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(hero.icon, f.x, f.y + 1);

    if (state.phase === "drift" && (Math.abs(f.vx) + Math.abs(f.vy) > 10)) {
      const speed = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
      const len = 14 + speed * 0.04;
      const nx = f.vx / speed;
      const ny = f.vy / speed;
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(f.x - nx * len, f.y - ny * len);
      ctx.lineTo(f.x, f.y);
      ctx.stroke();
    }
  });
}

function updateHud() {
  const current = getFighter(state.currentPlayer);
  const opponent = getOpponent(state.currentPlayer);

  document.getElementById("action-title").textContent = current.name + "'s Turn · Round " + state.turn;

  const hud = document.getElementById("hud-row");
  hud.innerHTML = "";
  [current, opponent].forEach((f) => {
    const h = getHeroDef(f.heroId);
    const div = document.createElement("div");
    div.className = "fighter-hud" + (f.player === state.currentPlayer ? " active" : "");
    div.style.setProperty("--fighter-color", h.color);
    const pct = Math.max(0, (f.hp / f.maxHp) * 100);
    div.innerHTML =
      '<div class="fighter-hud-player">Player ' + f.player + "</div>" +
      '<div class="fighter-hud-name">' + h.icon + " " + h.name + "</div>" +
      '<div class="hp-bar"><div class="hp-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="hp-text">' + f.hp + " / " + f.maxHp + " HP</div>" +
      (f.shield > 0 ? '<div class="shield-text">🛡 ' + f.shield + "</div>" : "") +
      (f.player === state.currentPlayer && f.cooldown > 0
        ? '<div class="cooldown-text">⏳ ' + h.power.name + " in " + f.cooldown + "</div>"
        : "");
    hud.appendChild(div);
  });
}

function setActionUI() {
  const current = getFighter(state.currentPlayer);
  const opponent = getOpponent(state.currentPlayer);
  const hero = getHeroDef(current.heroId);
  const inRange = canUsePower(current, opponent);

  const powerBtn = document.getElementById("btn-power");
  const endBtn = document.getElementById("btn-end-turn");
  const hint = document.getElementById("action-hint");
  const banner = document.getElementById("phase-banner");

  if (state.phase === "drift") {
    banner.textContent = "DRIFTING...";
    powerBtn.disabled = true;
    endBtn.disabled = true;
    powerBtn.textContent = hero.power.name;
    hint.textContent = "Balls bounce off the walls — hold tight!";
    return;
  }

  banner.textContent = "USE YOUR MOVE";
  endBtn.disabled = false;
  powerBtn.textContent = hero.power.name;
  powerBtn.disabled = current.cooldown > 0 || current.usedPowerThisTurn;

  if (current.cooldown > 0) {
    hint.textContent = "Power recharging (" + current.cooldown + " turns left). End turn or wait.";
  } else if (current.usedPowerThisTurn) {
    hint.textContent = "Power used! End your turn.";
  } else if (inRange) {
    hint.textContent = "Enemy in range — fire your power!";
  } else {
    hint.textContent = "Enemy out of range after the drift. End turn or skip attack.";
  }

  updateHud();
}

function canUsePower(attacker, defender) {
  const p = getHeroDef(attacker.heroId).power;
  if (p.global) return true;
  return dist(attacker, defender) <= p.range;
}

function startDriftPhase() {
  state.phase = "drift";
  state.driftTimer = DRIFT_TIME;
  state.effects = [];

  const active = getFighter(state.currentPlayer);
  const other = getOpponent(state.currentPlayer);

  const activeVel = randomDriftVelocity();
  active.vx = activeVel.vx;
  active.vy = activeVel.vy;
  active.bounces = 0;

  const otherVel = randomDriftVelocity();
  other.vx = otherVel.vx * 0.85;
  other.vy = otherVel.vy * 0.85;

  setActionUI();
  if (state.animId) cancelAnimationFrame(state.animId);
  let last = performance.now();
  state.animId = requestAnimationFrame(function tick(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    physicsStep(dt);
    drawArena();
    if (state.phase === "drift") state.animId = requestAnimationFrame(tick);
  });
}

function physicsStep(dt) {
  state.driftTimer -= dt;
  const f1 = state.fighters[0];
  const f2 = state.fighters[1];

  [f1, f2].forEach((ball) => {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    ball.vx *= DRIFT_FRICTION;
    ball.vy *= DRIFT_FRICTION;
    resolveCircleWall(ball);
  });

  resolveBallCollision(f1, f2);

  const speed1 = Math.sqrt(f1.vx * f1.vx + f1.vy * f1.vy);
  const speed2 = Math.sqrt(f2.vx * f2.vx + f2.vy * f2.vy);

  if (state.driftTimer <= 0 || (speed1 < 25 && speed2 < 25)) {
    f1.vx = 0; f1.vy = 0;
    f2.vx = 0; f2.vy = 0;
    f1.lastDir = { x: f1.x - CENTER, y: f1.y - CENTER };
    f2.lastDir = { x: f2.x - CENTER, y: f2.y - CENTER };
    endDriftPhase();
  }
}

function endDriftPhase() {
  state.phase = "action";
  const active = getFighter(state.currentPlayer);
  addLog("<strong>" + active.name + "</strong> stopped drifting — choose your move!");
  setActionUI();
  drawArena();
}

function usePower() {
  if (state.phase !== "action") return;
  const attacker = getFighter(state.currentPlayer);
  const defender = getOpponent(state.currentPlayer);
  const hero = getHeroDef(attacker.heroId);
  const power = hero.power;

  if (attacker.cooldown > 0 || attacker.usedPowerThisTurn) return;
  if (!canUsePower(attacker, defender)) {
    addLog("Out of range! The drift left you too far.");
    return;
  }

  let damage = power.damage;

  if (power.beam) {
    state.effects.push({
      type: "beam", life: 0.5,
      x1: attacker.x, y1: attacker.y,
      x2: defender.x, y2: defender.y
    });
  }
  if (power.global) {
    state.effects.push({
      type: "lightning", life: 0.5,
      x1: attacker.x, y1: attacker.y,
      x2: defender.x, y2: defender.y
    });
  }
  if (power.name === "Smash") {
    state.effects.push({ type: "smash", life: 0.4, x: defender.x, y: defender.y, r: 36 });
  }

  if (defender.shield > 0) {
    const blocked = Math.min(defender.shield, damage);
    damage -= blocked;
    defender.shield -= blocked;
    addLog("Shield blocked <strong>" + blocked + "</strong>!");
  }

  defender.hp = Math.max(0, defender.hp - damage);
  attacker.cooldown = power.cooldown;
  attacker.usedPowerThisTurn = true;
  if (power.shield) attacker.shield = power.shield;

  addLog("<strong>" + hero.name + "</strong> — " + power.name + "! <strong>" + damage + "</strong> dmg");

  drawArena();
  setTimeout(() => { state.effects = []; drawArena(); }, 500);

  if (defender.hp <= 0) {
    document.getElementById("win-hero").textContent = hero.name.toUpperCase();
    document.getElementById("win-player").textContent = attacker.name;
    if (state.animId) cancelAnimationFrame(state.animId);
    show("screen-win");
    return;
  }

  setActionUI();
}

function beginTurn(showPass) {
  const fighter = getFighter(state.currentPlayer);
  fighter.usedPowerThisTurn = false;
  if (fighter.cooldown > 0) fighter.cooldown -= 1;

  if (showPass) {
    const opp = getOpponent(state.currentPlayer);
    showHandoff(
      "Pass to " + fighter.name,
      "Hand the phone to <strong>" + fighter.name + "</strong>.<br>Don't let " + opp.name + " see!",
      "resume"
    );
    return;
  }

  updateHud();
  startDriftPhase();
}

function endTurn() {
  if (state.phase !== "action") return;
  state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
  if (state.currentPlayer === 1) state.turn += 1;
  beginTurn(true);
}

function initBattle() {
  const h1 = getHeroDef(state.p1Hero);
  const h2 = getHeroDef(state.p2Hero);

  state.fighters = [
    {
      player: 1, name: "Player 1", heroId: state.p1Hero,
      hp: h1.hp, maxHp: h1.hp,
      x: CENTER - 70, y: CENTER,
      vx: 0, vy: 0, cooldown: 0, shield: 0, usedPowerThisTurn: false, bounces: 0
    },
    {
      player: 2, name: "Player 2", heroId: state.p2Hero,
      hp: h2.hp, maxHp: h2.hp,
      x: CENTER + 70, y: CENTER,
      vx: 0, vy: 0, cooldown: 0, shield: 0, usedPowerThisTurn: false, bounces: 0
    }
  ];

  state.currentPlayer = 1;
  state.turn = 1;
  state.log = [];
  state.effects = [];
  addLog("<strong>FIGHT!</strong> " + h1.name + " vs " + h2.name);
  show("screen-battle");
  beginTurn(false);
}

function renderHeroGrid() {
  const grid = document.getElementById("hero-grid");
  const taken = state.pickStep === 2 ? state.p1Hero : null;
  grid.innerHTML = "";
  Object.values(HEROES).forEach((hero) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "hero-card";
    card.style.setProperty("--hero-color", hero.color);
    if (hero.id === taken) card.classList.add("taken");
    if (state.selectedHero === hero.id) card.classList.add("selected");
    card.innerHTML =
      '<span class="hero-icon">' + hero.icon + "</span>" +
      '<span class="hero-name">' + hero.name + "</span>" +
      '<span class="hero-power">' + hero.power.name + "</span>";
    card.addEventListener("click", () => {
      if (hero.id === taken) return;
      state.selectedHero = hero.id;
      document.getElementById("btn-confirm-pick").disabled = false;
      renderHeroGrid();
    });
    grid.appendChild(card);
  });
}

function showPickScreen(step) {
  state.pickStep = step;
  state.selectedHero = null;
  document.getElementById("btn-confirm-pick").disabled = true;
  const tag = document.getElementById("pick-player-tag");
  tag.textContent = "Player " + step;
  tag.className = "player-tag " + (step === 1 ? "p1" : "p2");
  renderHeroGrid();
  show("screen-pick");
}

function showHandoff(title, subHtml, next) {
  document.getElementById("handoff-title").textContent = title;
  document.getElementById("handoff-sub").innerHTML = subHtml;
  state.handoffNext = next;
  if (state.animId) cancelAnimationFrame(state.animId);
  show("screen-handoff");
}

function confirmPick() {
  if (!state.selectedHero) return;
  if (state.pickStep === 1) {
    state.p1Hero = state.selectedHero;
    showHandoff("Pass to Player 2", "Pick a hero — don't peek at Player 1's choice!", "pick2");
  } else {
    state.p2Hero = state.selectedHero;
    showHandoff("Pass to Player 1", "<strong>Player 1</strong> goes first!", "battle");
  }
}

document.getElementById("btn-hub").addEventListener("click", () => { window.location.href = "index.html"; });
document.getElementById("btn-win-hub").addEventListener("click", () => { window.location.href = "index.html"; });
document.getElementById("btn-fight").addEventListener("click", () => showPickScreen(1));
document.getElementById("btn-back-title").addEventListener("click", () => show("screen-title"));
document.getElementById("btn-confirm-pick").addEventListener("click", confirmPick);
document.getElementById("btn-handoff").addEventListener("click", () => {
  if (state.handoffNext === "pick2") showPickScreen(2);
  else if (state.handoffNext === "battle") initBattle();
  else if (state.handoffNext === "resume") {
    state.handoffNext = null;
    show("screen-battle");
    beginTurn(false);
  }
});
document.getElementById("btn-power").addEventListener("click", usePower);
document.getElementById("btn-end-turn").addEventListener("click", endTurn);
document.getElementById("btn-rematch").addEventListener("click", () => showPickScreen(1));
document.getElementById("btn-quit").addEventListener("click", () => {
  if (window.confirm("Quit?")) {
    if (state.animId) cancelAnimationFrame(state.animId);
    show("screen-title");
  }
});
</script>
</body>
</html>
